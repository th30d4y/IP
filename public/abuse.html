<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Reputation Checker - AbuseIPDB</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #00ff00;
            text-align: center;
            padding: 20px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            outline: none;
        }
        button {
            background: #1f1f1f;
            color: #00ff00;
            cursor: pointer;
        }
        button:hover {
            background: #333;
        }
        .result {
            margin-top: 20px;
            text-align: left;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>IP Reputation Checker - AbuseIPDB</h1>
    <input type="text" id="ipInput" placeholder="Enter IP Address">
    <button type="button" id="checkAbuseBtn">Check AbuseIPDB</button>
    <div class="result" id="result"></div>

    <script>
        // IP address validation regex
        const ipv4Regex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
        const ipv6Regex = /^(([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4})$/;

        function isValidIP(ip) {
            return ipv4Regex.test(ip) || ipv6Regex.test(ip);
        }

        document.getElementById("checkAbuseBtn").addEventListener("click", checkAbuseIPDB);
        document.getElementById("ipInput").addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                checkAbuseIPDB();
            }
        });

        async function checkAbuseIPDB() {
            console.log('Button clicked!');
            const ip = document.getElementById("ipInput").value.trim();
            const resultDiv = document.getElementById("result");

            // Client-side validation
            if (!ip) {
                resultDiv.textContent = "Please enter an IP address.";
                return;
            }

            if (!isValidIP(ip)) {
                resultDiv.textContent = "Invalid IP address format. Please enter a valid IPv4 or IPv6 address.";
                return;
            }

            if (ip.length > 45) {
                resultDiv.textContent = "IP address is too long.";
                return;
            }

            resultDiv.textContent = "Checking AbuseIPDB...";
            console.log('Fetching data for IP:', ip);

            try {
                const abuseResponse = await fetch(`/api/abuseipdb?ip=${encodeURIComponent(ip)}`);
                console.log('Response status:', abuseResponse.status);
                
                if (!abuseResponse.ok) {
                    let errorMessage = 'Error fetching data from AbuseIPDB.';
                    try {
                        const errorData = await abuseResponse.json();
                        errorMessage = errorData.error || errorMessage;
                    } catch (e) {
                        errorMessage = `HTTP ${abuseResponse.status}: ${abuseResponse.statusText}`;
                    }
                    resultDiv.textContent = errorMessage;
                    return;
                }

                const abuseData = await abuseResponse.json();
                console.log('Data received:', abuseData);

                resultDiv.innerHTML = ''; // Clear previous results

                const title = document.createElement('h3');
                title.textContent = `Results for IP: ${ip}`;
                resultDiv.appendChild(title);

                const abuseHeader = document.createElement('h4');
                abuseHeader.textContent = 'AbuseIPDB';
                resultDiv.appendChild(abuseHeader);

                const scoreP = document.createElement('p');
                scoreP.innerHTML = '<b>Abuse Confidence Score:</b> ';
                scoreP.appendChild(document.createTextNode(abuseData.data?.abuseConfidenceScore || 'N/A'));
                resultDiv.appendChild(scoreP);

                const categoriesP = document.createElement('p');
                categoriesP.innerHTML = '<b>Categories:</b> ';
                categoriesP.appendChild(document.createTextNode(abuseData.data?.category?.join(", ") || 'N/A'));
                resultDiv.appendChild(categoriesP);

                const countryP = document.createElement('p');
                countryP.innerHTML = '<b>Country:</b> ';
                countryP.appendChild(document.createTextNode(abuseData.data?.countryCode || 'N/A'));
                resultDiv.appendChild(countryP);

                const ispP = document.createElement('p');
                ispP.innerHTML = '<b>ISP:</b> ';
                ispP.appendChild(document.createTextNode(abuseData.data?.isp || 'N/A'));
                resultDiv.appendChild(ispP);

                const domainP = document.createElement('p');
                domainP.innerHTML = '<b>Domain:</b> ';
                domainP.appendChild(document.createTextNode(abuseData.data?.domain || 'N/A'));
                resultDiv.appendChild(domainP);
            } catch (error) {
                console.error('Fetch error:', error);
                resultDiv.textContent = 'Network error: ' + error.message;
            }
        }
    </script>
</body>
</html>
